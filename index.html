const SELECTED_BG="#8a9eba";
const TEXT_PRIMARY="#1a1a1a",TEXT_SECONDARY="#6b6056",TEXT_MUTED="#a09282";
const C_MEETING="#695773",C_DESIGN="#e08d53";
const C_DEPT_DBC="#d38989",C_DEPT_DESIGN="#e08d53",C_DEPT_CROSS="#8394a8";
const C_CARRYOVER="#a09282";

const isNotionMeeting = t => t?.startsWith("[Meeting]");
const getDeptColor = (dept, title) => {
  if (isNotionMeeting(title)) return C_MEETING;
  if (!dept) return TEXT_MUTED;
  if (dept.includes("DBC")) return C_DEPT_DBC;
  if (dept.includes("Design")) return C_DEPT_DESIGN;
  return C_DEPT_CROSS;
};
const getDeptLabel = (dept, title) => {
  if (isNotionMeeting(title)) return "Meeting";
  if (!dept) return "";
  if (dept.includes("Follow") || dept.includes("跨部門")) return "跨部門";
  if (dept.includes("Design")) return "Design";
  if (dept.includes("DBC")) return "DBC";
  return dept;
};

const taskDoneKey  = (d,i)     => `t:${d}::${i}`;
const eventDoneKey = (d,i)     => `e:${d}::${i}`;
const carryDoneKey = (disp,orig,i) => `carry:${disp}::${orig}::${i}`;
const LS_DONE = "done-w200";
const LS_KEY  = "notion-api-key";

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2200);
}

  {key:"tue",label:"TUE",date:"3/10"},
  {key:"wed",label:"WED",date:"3/11"},

  {key:"fri",label:"FRI",date:"3/13"},

  {key:"wed",label:"WED",date:"3/25"},

// ── UI Components ─────────────────────────────────────────────────────────────
function Checkbox({onDone}) {
  const [h,setH]=useState(false);
  return (
    <button onClick={onDone} onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)}
      style={{marginTop:3,flexShrink:0,width:14,height:14,borderRadius:3,
        border:`1.5px solid ${h?"#7aad8a":BORDER}`,
        background:h?"rgba(122,173,138,0.15)":"transparent",transition:"all 0.15s"}}/>
  );
}

function TaskCard({task,onDone,carryFrom}) {
  const dc=carryFrom?C_CARRYOVER:getDeptColor(task.dept,task.title);
  const dl=getDeptLabel(task.dept,task.title);
  return (
    <div style={{background:BG,border:`1px solid ${BORDER}`,borderLeft:`6px solid ${dc}`,
      borderRadius:"0 6px 6px 0",padding:"7px 10px",
      display:"flex",alignItems:"flex-start",gap:8,opacity:carryFrom?0.85:1}}>
      <Checkbox onDone={onDone}/>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontFamily:"'Noto Sans TC',sans-serif",fontSize:11.5,
          color:TEXT_PRIMARY,lineHeight:1.5,marginBottom:4,fontWeight:500}}>{task.title}</div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{display:"flex",gap:6,alignItems:"center"}}>
            <span style={{fontFamily:"'Geologica',sans-serif",fontSize:9,
              color:dc,fontWeight:600,letterSpacing:"0.04em"}}>{dl}</span>
            {carryFrom&&<span style={{fontFamily:"'Geologica',sans-serif",fontSize:8,
              color:C_CARRYOVER,fontWeight:500}}>← {carryFrom}</span>}
          </div>
          <span style={{fontFamily:"'Geologica',sans-serif",fontSize:9,
            color:"#666",fontWeight:700}}>{task.pts}p</span>
        </div>
      </div>
    </div>
  );
}

function EventCard({ev,onDone}) {
  return (
    <div style={{background:BG,border:`1px solid ${BORDER}`,borderLeft:`6px solid ${C_MEETING}`,
      borderRadius:"0 6px 6px 0",padding:"7px 10px",
      display:"flex",alignItems:"flex-start",gap:8}}>
      <Checkbox onDone={onDone}/>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontFamily:"'Geologica',sans-serif",fontSize:9,
          color:C_MEETING,fontWeight:700,letterSpacing:"0.04em",marginBottom:2}}>{ev.time}</div>
        <div style={{fontFamily:"'Noto Sans TC',sans-serif",fontSize:11.5,
          color:TEXT_PRIMARY,lineHeight:1.4,fontWeight:500}}>{ev.title}</div>
        {ev.with&&<div style={{fontFamily:"'Geologica',sans-serif",fontSize:9,
          color:TEXT_MUTED,marginTop:2}}>w/ {ev.with}</div>}
      </div>
    </div>
  );
}

function SectionHeader({dot,label,right}) {
  return (
    <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:10}}>
      <div style={{width:6,height:6,borderRadius:"50%",background:dot}}/>
      <span style={{fontFamily:"'Geologica',sans-serif",fontSize:9,color:TEXT_MUTED,
        letterSpacing:"0.12em",textTransform:"uppercase"}}>{label}</span>
      {right&&<div style={{marginLeft:"auto"}}>{right}</div>}
    </div>
  );
}

function WeeklyReview({doneSet,taskData}) {
  const undone=[];
  DAYS.forEach(day=>{
    ((taskData||notionTasks)[day.key]||[]).forEach((t,i)=>{
      const done=doneSet.has(taskDoneKey(day.key,i))||
        DAYS.some(ld=>doneSet.has(carryDoneKey(ld.key,day.key,i)));
      if(!done) undone.push({task:t,originDay:day});
    });
  });
  if(undone.length===0) return (
    <div style={{background:CARD,border:`1px solid ${BORDER}`,borderRadius:10,padding:14,marginBottom:8}}>
      <SectionHeader dot="#7aad8a" label="本週總覽"/>
      <div style={{fontFamily:"'Noto Sans TC',sans-serif",fontSize:12,
        color:"#7aad8a",textAlign:"center",padding:"10px 0"}}>🎉 本週全部完成！</div>
    </div>
  );
  return (
    <div style={{background:CARD,border:`1.5px solid #c9bfb0`,borderRadius:10,padding:14,marginBottom:8}}>
      <SectionHeader dot={C_CARRYOVER} label="本週未完成"
        right={<span style={{fontFamily:"'Geologica',sans-serif",fontSize:9,
          color:"#a09282",fontWeight:700}}>{undone.length} 項</span>}/>

        {undone.map(({task,originDay},i)=>{
          const dc=getDeptColor(task.dept,task.title);
          return (
            <div key={i} style={{background:BG,border:`1px solid ${BORDER}`,
              borderLeft:`6px solid ${dc}`,borderRadius:"0 6px 6px 0",
              padding:"7px 10px",display:"flex",gap:8,opacity:0.8}}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontFamily:"'Noto Sans TC',sans-serif",fontSize:11.5,
                  color:TEXT_PRIMARY,lineHeight:1.5,marginBottom:4,fontWeight:500}}>{task.title}</div>
                <div style={{display:"flex",justifyContent:"space-between"}}>
                  <div style={{display:"flex",gap:6}}>
                    <span style={{fontFamily:"'Geologica',sans-serif",fontSize:9,
                      color:dc,fontWeight:600}}>{getDeptLabel(task.dept,task.title)}</span>
                    <span style={{fontFamily:"'Geologica',sans-serif",fontSize:8,
                      color:TEXT_MUTED,fontWeight:500}}>{originDay.label}</span>
                  </div>
                  <span style={{fontFamily:"'Geologica',sans-serif",fontSize:9,
                    color:"#666",fontWeight:700}}>{task.pts}p</span>
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function DayColumn({dayInfo,doneSet,onDone,carryoverTasks,taskData}) {
  const allTasks=((taskData||notionTasks)[dayInfo.key]||[]).map((t,i)=>({...t,_idx:i}));
  const tasks=allTasks.filter(t=>!doneSet.has(taskDoneKey(dayInfo.key,t._idx)));
  const allEvents=(calendarEvents[dayInfo.key]||[]).map((e,i)=>({...e,_idx:i}));
  const events=allEvents.filter(e=>!doneSet.has(eventDoneKey(dayInfo.key,e._idx)));
  const totalPts=tasks.reduce((s,t)=>s+t.pts,0);
  const taskDone=allTasks.filter(t=>doneSet.has(taskDoneKey(dayInfo.key,t._idx))).length;
  const visibleCarry=carryoverTasks.filter(c=>!doneSet.has(carryDoneKey(dayInfo.key,c.originKey,c._idx)));
  return (
    <div style={{flex:1,minWidth:0,display:"flex",flexDirection:"column",gap:8}}>
      <div style={{background:CARD,border:`1px solid ${BORDER}`,borderRadius:10,padding:12}}>
        <SectionHeader dot={C_MEETING} label="Calendar"/>
        {events.length===0
          ?<div style={{fontFamily:"'Noto Sans TC',sans-serif",fontSize:11,
              color:TEXT_MUTED,textAlign:"center",padding:"10px 0"}}>—</div>
          :<div style={{display:"flex",flexDirection:"column",gap:5}}>
            {events.map(ev=>(
              <EventCard key={`${dayInfo.key}-ev-${ev._idx}`} ev={ev}
                onDone={()=>onDone(eventDoneKey(dayInfo.key,ev._idx))}/>
            ))}
          </div>
        }
      </div>
      <div style={{background:CARD,border:`1px solid ${BORDER}`,borderRadius:10,padding:12,flex:1}}>
        <SectionHeader dot={C_DESIGN} label="Notion"
          right={
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              {taskDone>0&&<span style={{fontFamily:"'Geologica',sans-serif",fontSize:9,
                color:"#7aad8a",fontWeight:600}}>✓ {taskDone}</span>}
              {totalPts>0&&<span style={{fontFamily:"'Geologica',sans-serif",fontSize:9,
                color:"#3d4a5c",fontWeight:700}}>{totalPts}p</span>}
            </div>
          }/>
        {tasks.length===0&&visibleCarry.length===0
          ?<div style={{fontFamily:"'Noto Sans TC',sans-serif",fontSize:12,
              color:taskDone>0?"#7aad8a":TEXT_MUTED,textAlign:"center",padding:"14px 0"}}>
              {taskDone>0?"✓ 全部完成":"—"}
            </div>
          :<div style={{display:"flex",flexDirection:"column",gap:5}}>
            {tasks.map(t=>(
              <TaskCard key={`${dayInfo.key}-task-${t._idx}`} task={t}
                onDone={()=>onDone(taskDoneKey(dayInfo.key,t._idx))}/>
            ))}
            {visibleCarry.length>0&&<>
              {tasks.length>0&&<div style={{borderTop:`1px dashed ${BORDER}`,margin:"4px 0"}}/>}
              {visibleCarry.map((c,i)=>(
                <TaskCard key={`carry-${dayInfo.key}-${c.originKey}-${c._idx}`} task={c}
                  carryFrom={c.originLabel}
                  onDone={()=>onDone(carryDoneKey(dayInfo.key,c.originKey,c._idx))}/>
              ))}
            </>}
          </div>
        }
      </div>
    </div>
  );
}

  return (
    <div style={{padding:"0 0 20px"}}>
      <div style={{fontFamily:"'Geologica',sans-serif",fontSize:11,color:TEXT_MUTED,

function SettingsModal({keyInput,setKeyInput,notionKey,onSave,onClose}) {
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.35)",
      display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,padding:20}}>
      <div style={{background:CARD,border:`1px solid ${BORDER}`,borderRadius:16,
        padding:24,width:"100%",maxWidth:360,boxShadow:"0 8px 32px rgba(0,0,0,0.12)"}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:20}}>
          <span style={{fontSize:16}}>⚙️</span>
          <span style={{fontFamily:"'Geologica',sans-serif",fontSize:12,fontWeight:700,
            letterSpacing:"0.1em",color:TEXT_PRIMARY}}>NOTION 設定</span>
        </div>
        <div style={{marginBottom:16}}>
          <div style={{fontFamily:"'Geologica',sans-serif",fontSize:9,fontWeight:600,
            letterSpacing:"0.1em",color:TEXT_MUTED,marginBottom:6}}>NOTION API KEY</div>
          <input type="password" value={keyInput} onChange={e=>setKeyInput(e.target.value)}
            placeholder={notionKey?"已儲存（輸入新 key 可更新）":"secret_xxxxxxxxxxxx"}
            style={{width:"100%",padding:"10px 12px",
              fontFamily:"'Geologica',sans-serif",fontSize:11,
              background:notionKey?"#f5f2ec":"#fffde7",
              border:`1.5px solid ${notionKey?BORDER:"#e0c840"}`,
              borderRadius:8,outline:"none",color:TEXT_PRIMARY,boxSizing:"border-box"}}/>
        </div>
        <div style={{background:BG,borderRadius:8,padding:"10px 12px",marginBottom:20,
          fontFamily:"'Noto Sans TC',sans-serif",fontSize:10,color:TEXT_MUTED,lineHeight:1.7}}>
          ① 前往 notion.so/my-integrations 建立 Integration<br/>
          ② 複製 API Key 貼上<br/>
          ③ Key 只存在你的瀏覽器 localStorage，不會上傳
        </div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={()=>{
            if(keyInput.trim()){
              localStorage.setItem(LS_KEY,keyInput.trim());
              onSave(keyInput.trim());
            }
            onClose();
          }} style={{flex:1,padding:"10px 0",fontFamily:"'Geologica',sans-serif",
            fontSize:10,fontWeight:700,background:"#3d4a5c",color:"#fff",
            border:"none",borderRadius:8,cursor:"pointer"}}>
            儲存設定
          </button>
          <button onClick={onClose} style={{flex:1,padding:"10px 0",
            fontFamily:"'Geologica',sans-serif",fontSize:10,fontWeight:600,
            background:"transparent",color:TEXT_SECONDARY,
            border:`1.5px solid ${BORDER}`,borderRadius:8,cursor:"pointer"}}>
            取消
          </button>
        </div>
      </div>
    </div>
  );
}

// ── Main ──────────────────────────────────────────────────────────────────────
function WeeklyDashboard() {
  const [view,setView]=useState('thisWeek');
  const [startIdx,setStartIdx]=useState(0);
  const [doneSet,setDoneSet]=useState(()=>{
    try{const s=localStorage.getItem(LS_DONE);return s?new Set(JSON.parse(s)):new Set();}
    catch{return new Set();}
  });
  const [taskData,setTaskData]=useState(notionTasks);
  const [syncing,setSyncing]=useState(false);
  const [lastSync,setLastSync]=useState(null);
  const [notionKey,setNotionKey]=useState(()=>{
    try{return localStorage.getItem(LS_KEY)||'';}catch{return '';}
  });
  const [showSettings,setShowSettings]=useState(false);
  const [keyInput,setKeyInput]=useState('');
  const visible=DAYS.slice(startIdx,startIdx+2);

  useEffect(()=>{
    try{localStorage.setItem(LS_DONE,JSON.stringify([...doneSet]));}catch{}
  },[doneSet]);

  const handleDone=id=>setDoneSet(prev=>new Set([...prev,id]));

  const handleExport=()=>{
    const blob=new Blob([JSON.stringify({week:"w199",ts:new Date().toISOString(),done:[...doneSet]},null,2)],
      {type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");a.href=url;a.download="done-w200.json";a.click();
    URL.revokeObjectURL(url);showToast("✓ 已匯出打勾狀態");
  };

  useEffect(()=>{
    const input=document.getElementById("importFile");
    const handler=e=>{
      const file=e.target.files[0];if(!file)return;
      const reader=new FileReader();
      reader.onload=ev=>{
        try{
          const obj=JSON.parse(ev.target.result);
          const arr=Array.isArray(obj)?obj:(obj.done||[]);
          setDoneSet(new Set(arr));showToast("✓ 匯入成功");
        }catch{showToast("✗ 格式錯誤");}
        input.value="";
      };
      reader.readAsText(file);
    };
    input.addEventListener("change",handler);
    return()=>input.removeEventListener("change",handler);
  },[]);

  const JOY_ID="user://1a59b1f2-b650-4d70-a70d-6e0b333e8962";
  const WEEK_DATES={"2026-03-16":"mon","2026-03-17":"tue","2026-03-18":"wed","2026-03-19":"thu","2026-03-20":"fri"};
  const normDept=d=>{
    if(!d)return "DBC";
    const s=d.trim();
    if(s.includes("Follow")||s.includes("跨"))return "專案Follow / 跨部門";
    if(s.includes("Design"))return "Design team / AlleyPin";
    return "DBC";
  };

  const handleSync=async()=>{
    if(!notionKey){setKeyInput('');setShowSettings(true);return;}
    setSyncing(true);
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":notionKey,"anthropic-version":"2023-06-01"},
        body:JSON.stringify({
          model:"claude-sonnet-4-20250514",max_tokens:4000,
          system:"You are a Notion data assistant. Use the notion-query-database-view tool to query the given view URL. Return ONLY the raw JSON results array, no other text.",
          messages:[{role:"user",content:"Query this view and return the full results JSON array: https://www.notion.so/alleypin/4f701cf0df2546b9a32705f8208c4aeb?v=b1ebc871408041f283248e3f7f6dc6aa"}],
          mcp_servers:[{type:"url",url:"https://mcp.notion.com/mcp",name:"notion-mcp"}]
        })
      });
      const data=await res.json();
      let results=null;
      for(const block of(data.content||[])){
        try{
          const raw=block.type==="mcp_tool_result"?JSON.stringify(block.content)
            :block.type==="text"?block.text:null;
          if(!raw)continue;
          const p=JSON.parse(raw.replace(/```json|```/g,"").trim());
          if(p?.results){results=p.results;break;}
          if(Array.isArray(p)){results=p;break;}
        }catch{}
      }
      if(!results?.length)throw new Error("No results");
      const newData={mon:[],tue:[],wed:[],thu:[],fri:[]};
      for(const r of results){
        const day=WEEK_DATES[r["date:期限:start"]];
        if(!day)continue;
        if(!(r["Assign"]||"").includes(JOY_ID))continue;
        newData[day].push({title:r["Name"]||"",dept:normDept(r["Department "]||""),pts:r["Story points"]||0});
      }
      const count = Object.values(newData).flat().length;
      if(count>0){
        setTaskData(newData);
        setLastSync(new Date().toLocaleTimeString("zh-TW",{hour:"2-digit",minute:"2-digit"}) + `，共 ${count} 筆`);
        showToast(`✓ 同步完成，共 ${count} 筆工作票`);
      } else {
        showToast("⚠️ 同步完成但沒有找到票，請確認 view 設定");
      }
    }catch(e){
      const msg = e.message||'';
      if(msg.includes('401')||msg.includes('auth')) showToast("✗ API Key 錯誤，請重新設定");
      else if(msg.includes('No results')) showToast("⚠️ 沒找到票，請確認 Integration 有連結到 DB");
      else showToast("✗ 同步失敗：" + (msg||'未知錯誤'));
    }
    setSyncing(false);
  };

  const isTaskDone=(dayKey,idx)=>
    doneSet.has(taskDoneKey(dayKey,idx))||
    DAYS.some(d=>doneSet.has(carryDoneKey(dayKey,d.key,idx)));

  const getCarryoverForDay=dayIdx=>{
    if(dayIdx===0)return[];
    const carry=[];
    for(let i=0;i<dayIdx;i++){
      const d=DAYS[i];
      ((taskData||notionTasks)[d.key]||[]).forEach((t,idx)=>{
        if(!isTaskDone(d.key,idx))
          carry.push({...t,_idx:idx,originKey:d.key,originLabel:d.label});
      });
    }
    return carry;
  };

  const BtnStyle={
    fontFamily:"'Geologica',sans-serif",fontSize:9,fontWeight:600,
    letterSpacing:"0.06em",color:"#3d4a5c",background:CARD,
    border:`1px solid ${BORDER}`,borderRadius:6,padding:"5px 10px",transition:"all 0.15s"
  };

  return (
    <div style={{background:BG,minHeight:"100vh",padding:"20px 16px"}}>
      {/* Header */}
      <div style={{marginBottom:16,display:"flex",alignItems:"flex-start",
        justifyContent:"space-between",flexWrap:"wrap",gap:10}}>
        <div>
          <div style={{fontFamily:"'Geologica',sans-serif",fontSize:18,fontWeight:700,
            color:TEXT_PRIMARY,letterSpacing:"-0.02em"}}>This Week working hours in AlleyPin</div>
          <div style={{fontFamily:"'Geologica',sans-serif",fontSize:11,color:TEXT_MUTED,marginTop:2}}>
            {view==='thisWeek'?'03.09 – 03.13':'03.16 – 03.20'} · Joy
            {view==='thisWeek'&&lastSync&&<span style={{marginLeft:8,opacity:0.6,fontSize:10}}>✓ {lastSync}</span>}
          </div>
          {/* Week toggle */}
          <div style={{display:"flex",gap:5,marginTop:10}}>
            {[{id:'thisWeek',label:'THIS WEEK'},{id:'nextWeek',label:'NEXT WEEK'}].map(w=>(
              <button key={w.id} onClick={()=>setView(w.id)}
                style={{fontFamily:"'Geologica',sans-serif",fontSize:9,fontWeight:600,
                  letterSpacing:"0.06em",padding:"4px 12px",
                  background:view===w.id?SELECTED_BG:SURFACE,
                  color:view===w.id?"#fff":TEXT_SECONDARY,
                  border:`1.5px solid ${view===w.id?SELECTED_BG:BORDER}`,
                  borderRadius:6,transition:"all 0.15s"}}>
                {w.label}
              </button>
            ))}
          </div>
        </div>

        {/* Action buttons — thisWeek only */}
        {view==='thisWeek'&&(
          <div style={{display:"flex",flexWrap:"wrap",gap:6,alignItems:"center"}}>

            <button onClick={handleExport} style={BtnStyle}>↓ 匯出</button>
            <button onClick={()=>document.getElementById("importFile").click()} style={BtnStyle}>↑ 匯入</button>
            <div style={{display:"flex",gap:10,alignItems:"center",marginLeft:4}}>
              {[{color:C_DEPT_DBC,label:"DBC"},{color:C_DEPT_DESIGN,label:"Design"},
                {color:C_DEPT_CROSS,label:"跨部門"},{color:C_MEETING,label:"Meeting"}].map(({color,label})=>(
                <div key={label} style={{display:"flex",alignItems:"center",gap:4}}>
                  <div style={{width:7,height:3,borderRadius:2,background:color}}/>
                  <span style={{fontFamily:"'Geologica',sans-serif",fontSize:9,color:TEXT_MUTED}}>{label}</span>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>

      {/* Content */}
      {view==='nextWeek' ? <NextWeekView/> : (
        <>
          {/* Day tabs */}
          <div style={{display:"flex",gap:5,marginBottom:14}}>
            {DAYS.map((d,i)=>{
              const isActive=i===startIdx||i===startIdx+1;
              const allTasks=((taskData||notionTasks)[d.key]||[]).map((t,idx)=>({...t,_idx:idx}));
              const remaining=allTasks.filter(t=>!doneSet.has(taskDoneKey(d.key,t._idx))).length;
              const hasCal=(calendarEvents[d.key]||[]).length>0;
              const allDone=allTasks.length>0&&remaining===0;
              const hasCarry=getCarryoverForDay(i).length>0;
              return (
                <button key={d.key} onClick={()=>setStartIdx(Math.min(i,DAYS.length-2))}
                  style={{flex:1,padding:"8px 4px 6px",
                    background:isActive?SELECTED_BG:SURFACE,
                    border:`1.5px solid ${isActive?SELECTED_BG:BORDER}`,
                    borderRadius:9,color:isActive?"#fff":TEXT_SECONDARY,
                    fontFamily:"'Geologica',sans-serif",fontSize:10,
                    fontWeight:isActive?700:400,letterSpacing:"0.07em",transition:"all 0.15s"}}>
                  <div>{d.label}</div>
                  <div style={{fontSize:9,marginTop:1,opacity:0.75}}>{d.date}</div>
                  <div style={{display:"flex",gap:3,justifyContent:"center",marginTop:4}}>
                    {hasCal&&<div style={{width:4,height:4,borderRadius:"50%",
                      background:isActive?"rgba(255,255,255,0.7)":C_MEETING}}/>}
                    {hasCarry&&<div style={{width:4,height:4,borderRadius:"50%",
                      background:isActive?"rgba(255,255,255,0.7)":C_CARRYOVER}}/>}
                    {allDone
                      ?<div style={{width:4,height:4,borderRadius:"50%",
                          background:isActive?"rgba(255,255,255,0.7)":"#7aad8a"}}/>
                      :remaining>0&&<div style={{width:4,height:4,borderRadius:"50%",
                          background:isActive?"rgba(255,255,255,0.7)":C_DESIGN}}/>
                    }
                  </div>
                </button>
              );
            })}
          </div>

          {/* Two-column */}
          <div style={{display:"flex",gap:10}}>
            {visible.map(d=>{
              const dayIdx=DAYS.findIndex(x=>x.key===d.key);
              const isFri=d.key==="fri";
              return (
                <div key={d.key} style={{flex:1,minWidth:0}}>
                  <div style={{fontFamily:"'Geologica',sans-serif",fontSize:11,fontWeight:700,
                    color:TEXT_SECONDARY,letterSpacing:"0.08em",marginBottom:8,paddingLeft:2}}>
                    {d.label} <span style={{fontWeight:400,color:TEXT_MUTED}}>{d.date}</span>
                  </div>
                  {isFri&&<WeeklyReview doneSet={doneSet} taskData={taskData}/>}
                  <DayColumn dayInfo={d} doneSet={doneSet} onDone={handleDone}
                    carryoverTasks={getCarryoverForDay(dayIdx)} taskData={taskData}/>
                </div>
              );
            })}
          </div>
        </>
      )}

      {/* Settings Modal */}
      {showSettings&&(
        <SettingsModal keyInput={keyInput} setKeyInput={setKeyInput}
          notionKey={notionKey} onSave={k=>setNotionKey(k)}
          onClose={()=>setShowSettings(false)}/>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<WeeklyDashboard/>);
</script>
</body>
