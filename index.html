function WeeklyDashboard() {
  const [view,setView]=useState('thisWeek');
  const [startIdx,setStartIdx]=useState(0);
  const [doneSet,setDoneSet]=useState(()=>{
    try{const s=localStorage.getItem(LS_DONE);return s?new Set(JSON.parse(s)):new Set();}
    catch{return new Set();}
  });
  const [taskData,setTaskData]=useState(notionTasks);
  const [syncing,setSyncing]=useState(false);
  const [lastSync,setLastSync]=useState(null);
  const [notionKey,setNotionKey]=useState(()=>{
    try{return localStorage.getItem(LS_KEY)||'';}catch{return '';}
  });
  const [showSettings,setShowSettings]=useState(false);
  const [keyInput,setKeyInput]=useState('');
  const [showAddForm,setShowAddForm]=useState(false);
  const [addForm,setAddForm]=useState({title:'',day:'mon',dept:'DBC',pts:'0.25',weekly:'W200'});
  const [adding,setAdding]=useState(false);
  const visible=DAYS.slice(startIdx,startIdx+2);

  useEffect(()=>{
    try{localStorage.setItem(LS_DONE,JSON.stringify([...doneSet]));}catch{}
  },[doneSet]);

  const handleDone=(id)=>{
    setDoneSet(prev=>new Set([...prev,id]));
  };

  const handleUndone=(id)=>{
    setDoneSet(prev=>{const s=new Set(prev);s.delete(id);return s;});
  };

  const handleAddTask=async()=>{
    if(!addForm.title.trim()){showToast("✗ 請輸入票名");return;}
    setAdding(true);
    try{
      const weekly=WEEKLY_MAP[addForm.weekly];
      const body={
        parent:{database_id:DB_ID},
        properties:{
          "Name":{title:[{text:{content:addForm.title.trim()}}]},
          "Department ":{select:{name:addForm.dept==="DBC"?"DBC":addForm.dept==="Design"?"Design team / AlleyPin":"專案Follow / 跨部門"}},
          "Story points":{number:parseFloat(addForm.pts)},
          "Assign":{people:[{object:"user",id:JOY_ID}]},
          "期限":{date:{start:DAY_DATE_MAP[addForm.day]}},
          "⏰ Weekly":{relation:[{id:weekly.id}]},
        }
      };
      const res=await fetch(`${PROXY}/v1/pages`,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify(body)
      });
      const data=await res.json();
      if(data.id){
        // Also add to local taskData
        const dayKey=addForm.day;
        setTaskData(prev=>({
          ...prev,
          [dayKey]:[...(prev[dayKey]||[]),{title:addForm.title.trim(),dept:addForm.dept==="DBC"?"DBC":addForm.dept==="Design"?"Design team / AlleyPin":"專案Follow / 跨部門",pts:parseFloat(addForm.pts)}]
        }));
        setAddForm({title:'',day:'mon',dept:'DBC',pts:'0.25',weekly:'W200'});
        setShowAddForm(false);
        showToast("✓ 票已新增到 Notion！");
      } else {
        showToast("✗ 新增失敗："+JSON.stringify(data).slice(0,50));
      }
    }catch(e){
      showToast("✗ 錯誤："+e.message);
    }
    setAdding(false);
  };

  const handleExport=()=>{
    const blob=new Blob([JSON.stringify({week:"w199",ts:new Date().toISOString(),done:[...doneSet]},null,2)],
      {type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");a.href=url;a.download="done-w200.json";a.click();
    URL.revokeObjectURL(url);showToast("✓ 已匯出打勾狀態");
  };



  const normDept=d=>{
    if(!d)return "DBC";
    const s=d.trim();
    if(s.includes("Follow")||s.includes("跨"))return "專案Follow / 跨部門";
    if(s.includes("Design"))return "Design team / AlleyPin";
    return "DBC";
  };

  const handleSync=async()=>{
    if(!notionKey){setKeyInput('');setShowSettings(true);return;}
    setSyncing(true);
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":notionKey,"anthropic-version":"2023-06-01"},
        body:JSON.stringify({
          model:"claude-sonnet-4-20250514",max_tokens:4000,
          system:"You are a Notion data assistant. Use the notion-query-database-view tool to query the given view URL. Return ONLY the raw JSON results array, no other text.",
          messages:[{role:"user",content:"Query this view and return the full results JSON array: https://www.notion.so/alleypin/4f701cf0df2546b9a32705f8208c4aeb?v=b1ebc871408041f283248e3f7f6dc6aa"}],
          mcp_servers:[{type:"url",url:"https://mcp.notion.com/mcp",name:"notion-mcp"}]
        })
      });
      const data=await res.json();
      let results=null;
      for(const block of(data.content||[])){
        try{
          const raw=block.type==="mcp_tool_result"?JSON.stringify(block.content)
            :block.type==="text"?block.text:null;
          if(!raw)continue;
          const p=JSON.parse(raw.replace(/```json|```/g,"").trim());
          if(p?.results){results=p.results;break;}
          if(Array.isArray(p)){results=p;break;}
        }catch{}
      }
      if(!results?.length)throw new Error("No results");
      const newData={mon:[],tue:[],wed:[],thu:[],fri:[]};
      for(const r of results){
        const day=WEEK_DATES[r["date:期限:start"]];
        if(!day)continue;
        if(!(r["Assign"]||"").includes(JOY_ID))continue;
        newData[day].push({title:r["Name"]||"",dept:normDept(r["Department "]||""),pts:r["Story points"]||0});
      }
      const count = Object.values(newData).flat().length;
      if(count>0){
        setTaskData(newData);
        setLastSync(new Date().toLocaleTimeString("zh-TW",{hour:"2-digit",minute:"2-digit"}) + `，共 ${count} 筆`);
        showToast(`✓ 同步完成，共 ${count} 筆工作票`);
      } else {
        showToast("⚠️ 同步完成但沒有找到票，請確認 view 設定");
      }
    }catch(e){
      const msg = e.message||'';
      if(msg.includes('401')||msg.includes('auth')) showToast("✗ API Key 錯誤，請重新設定");
      else if(msg.includes('No results')) showToast("⚠️ 沒找到票，請確認 Integration 有連結到 DB");
      else showToast("✗ 同步失敗：" + (msg||'未知錯誤'));
    }
    setSyncing(false);
  };

  const isTaskDone=(dayKey,idx)=>
    doneSet.has(taskDoneKey(dayKey,idx))||
    DAYS.some(d=>doneSet.has(carryDoneKey(dayKey,d.key,idx)));

  const getCarryoverForDay=dayIdx=>{
    if(dayIdx===0)return[];
    const carry=[];
    for(let i=0;i<dayIdx;i++){
      const d=DAYS[i];
      ((taskData||notionTasks)[d.key]||[]).forEach((t,idx)=>{
        if(!isTaskDone(d.key,idx))
          carry.push({...t,_idx:idx,originKey:d.key,originLabel:d.label});
      });
    }
    return carry;
  };

  const BtnStyle={
    fontFamily:"'Geologica',sans-serif",fontSize:9,fontWeight:600,
    letterSpacing:"0.06em",color:"#3d4a5c",background:CARD,
    border:`1px solid ${BORDER}`,borderRadius:6,padding:"5px 10px",transition:"all 0.15s"
  };

  return (
    <div style={{background:BG,minHeight:"100vh",padding:"20px 16px"}}>
      {/* Header */}
      <div style={{marginBottom:16,display:"flex",alignItems:"flex-start",
        justifyContent:"space-between",flexWrap:"wrap",gap:10}}>
        <div>
          <div style={{fontFamily:"'Geologica',sans-serif",fontSize:18,fontWeight:700,
            color:TEXT_PRIMARY,letterSpacing:"-0.02em"}}>This Week working hours in AlleyPin</div>
          <div style={{fontFamily:"'Geologica',sans-serif",fontSize:11,color:TEXT_MUTED,marginTop:2}}>
            '03.23 – 03.27' · Joy
            {view==='thisWeek'&&lastSync&&<span style={{marginLeft:8,opacity:0.6,fontSize:10}}>✓ {lastSync}</span>}
          </div>
          {/* Week toggle */}
          <div style={{display:"flex",gap:5,marginTop:10}}>
            {[{id:'thisWeek',label:'THIS WEEK'},{id:'nextWeek',label:'NEXT WEEK'}].map(w=>(
              <button key={w.id} onClick={()=>setView(w.id)}
                style={{fontFamily:"'Geologica',sans-serif",fontSize:9,fontWeight:600,
                  letterSpacing:"0.06em",padding:"4px 12px",
                  background:view===w.id?SELECTED_BG:SURFACE,
                  color:view===w.id?"#fff":TEXT_SECONDARY,
                  border:`1.5px solid ${view===w.id?SELECTED_BG:BORDER}`,
                  borderRadius:6,transition:"all 0.15s"}}>
                {w.label}
              </button>
            ))}
          </div>
        </div>

        {/* Action buttons — thisWeek only */}
        {view==='thisWeek'&&(
          <div style={{display:"flex",flexWrap:"wrap",gap:6,alignItems:"center"}}>

            <button onClick={()=>setShowAddForm(true)}
              style={{...BtnStyle,background:"#e08d53",color:"#fff",fontWeight:700,fontSize:13,padding:"6px 16px",borderRadius:8}}>＋ 新增票</button>

            <div style={{display:"flex",gap:10,alignItems:"center",marginLeft:4}}>
              {[{color:C_DEPT_DBC,label:"DBC"},{color:C_DEPT_DESIGN,label:"Design"},
                {color:C_DEPT_CROSS,label:"跨部門"},{color:C_MEETING,label:"Meeting"}].map(({color,label})=>(
                <div key={label} style={{display:"flex",alignItems:"center",gap:4}}>
                  <div style={{width:7,height:3,borderRadius:2,background:color}}/>
                  <span style={{fontFamily:"'Geologica',sans-serif",fontSize:9,color:TEXT_MUTED}}>{label}</span>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>

      {/* Content */}
      {view==='nextWeek' ? <NextWeekView/> : (
        <>
          {/* Day tabs */}
          <div style={{display:"flex",gap:5,marginBottom:14}}>
            {DAYS.map((d,i)=>{
              const isActive=i===startIdx||i===startIdx+1;
              const allTasks=((taskData||notionTasks)[d.key]||[]).map((t,idx)=>({...t,_idx:idx}));
              const remaining=((taskData||notionTasks)[d.key]||[]).filter((t,i)=>!doneSet.has(taskDoneKey(d.key,i))).length;
              const hasCal=(calendarEvents[d.key]||[]).length>0;
              const allDone=allTasks.length>0&&remaining===0;
              const hasCarry=getCarryoverForDay(i).length>0;
              return (
                <button key={d.key} onClick={()=>setStartIdx(Math.min(i,DAYS.length-2))}
                  style={{flex:1,padding:"8px 4px 6px",
                    background:isActive?SELECTED_BG:SURFACE,
                    border:`1.5px solid ${isActive?SELECTED_BG:BORDER}`,
                    borderRadius:9,color:isActive?"#fff":TEXT_SECONDARY,
                    fontFamily:"'Geologica',sans-serif",fontSize:10,
                    fontWeight:isActive?700:400,letterSpacing:"0.07em",transition:"all 0.15s"}}>
                  <div>{d.label}</div>
                  <div style={{fontSize:9,marginTop:1,opacity:0.75}}>{d.date}</div>
                  <div style={{display:"flex",gap:3,justifyContent:"center",marginTop:4}}>
                    {hasCal&&<div style={{width:4,height:4,borderRadius:"50%",
                      background:isActive?"rgba(255,255,255,0.7)":C_MEETING}}/>}
                    {hasCarry&&<div style={{width:4,height:4,borderRadius:"50%",
                      background:isActive?"rgba(255,255,255,0.7)":C_CARRYOVER}}/>}
                    {allDone
                      ?<div style={{width:4,height:4,borderRadius:"50%",
                          background:isActive?"rgba(255,255,255,0.7)":"#7aad8a"}}/>
                      :remaining>0&&<div style={{width:4,height:4,borderRadius:"50%",
                          background:isActive?"rgba(255,255,255,0.7)":C_DESIGN}}/>
                    }
                  </div>
                </button>
              );
            })}
          </div>

          {/* Two-column */}
          <div style={{display:"flex",gap:10}}>
            {visible.map(d=>{
              const dayIdx=DAYS.findIndex(x=>x.key===d.key);
              const isFri=d.key==="fri";
              return (
                <div key={d.key} style={{flex:1,minWidth:0}}>
                  <div style={{fontFamily:"'Geologica',sans-serif",fontSize:11,fontWeight:700,
                    color:TEXT_SECONDARY,letterSpacing:"0.08em",marginBottom:8,paddingLeft:2}}>
                    {d.label} <span style={{fontWeight:400,color:TEXT_MUTED}}>{d.date}</span>
                  </div>
                  {isFri&&<WeeklyReview doneSet={doneSet} taskData={taskData}/>}
                  <DayColumn dayInfo={d} doneSet={doneSet} onDone={handleDone} onUndone={handleUndone}
                    carryoverTasks={getCarryoverForDay(dayIdx)} taskData={taskData}/>
                </div>
              );
            })}
          </div>
        </>
      )}

      {/* Settings Modal */}
      {showAddForm&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",
          display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,padding:20}}>
          <div style={{background:CARD,border:`1px solid ${BORDER}`,borderRadius:16,
            padding:24,width:"100%",maxWidth:360}}>
            <div style={{fontFamily:"'Geologica',sans-serif",fontWeight:700,fontSize:14,
              color:TEXT_PRIMARY,marginBottom:16}}>＋ 新增工作票</div>

            {/* 票名 */}
            <div style={{marginBottom:12}}>
              <div style={{fontFamily:"'Geologica',sans-serif",fontSize:10,color:TEXT_MUTED,marginBottom:4}}>票名</div>
              <input value={addForm.title} onChange={e=>setAddForm(p=>({...p,title:e.target.value}))}
                placeholder="票名..."
                style={{width:"100%",padding:"8px 10px",borderRadius:8,border:`1.5px solid ${BORDER}`,
                  background:SURFACE,fontFamily:"'Noto Sans TC',sans-serif",fontSize:12,
                  color:TEXT_PRIMARY,outline:"none"}}/>
            </div>

            {/* 日期 */}
            <div style={{marginBottom:12}}>
              <div style={{fontFamily:"'Geologica',sans-serif",fontSize:10,color:TEXT_MUTED,marginBottom:4}}>日期</div>
              <select value={addForm.day} onChange={e=>setAddForm(p=>({...p,day:e.target.value}))}
                style={{width:"100%",padding:"8px 10px",borderRadius:8,border:`1.5px solid ${BORDER}`,
                  background:SURFACE,fontFamily:"'Geologica',sans-serif",fontSize:12,color:TEXT_PRIMARY}}>
                <option value="mon">MON 3/16</option>
                <option value="tue">TUE 3/17</option>
                <option value="wed">WED 3/18</option>
                <option value="thu">THU 3/19</option>
                <option value="fri">FRI 3/20</option>
              </select>
            </div>

            {/* Department */}
            <div style={{marginBottom:12}}>
              <div style={{fontFamily:"'Geologica',sans-serif",fontSize:10,color:TEXT_MUTED,marginBottom:4}}>Department</div>
              <select value={addForm.dept} onChange={e=>setAddForm(p=>({...p,dept:e.target.value}))}
                style={{width:"100%",padding:"8px 10px",borderRadius:8,border:`1.5px solid ${BORDER}`,
                  background:SURFACE,fontFamily:"'Geologica',sans-serif",fontSize:12,color:TEXT_PRIMARY}}>
                <option value="DBC">DBC</option>
                <option value="Design">Design team</option>
                <option value="Cross">跨部門</option>
              </select>
            </div>

            {/* Story Points */}
            <div style={{marginBottom:12}}>
              <div style={{fontFamily:"'Geologica',sans-serif",fontSize:10,color:TEXT_MUTED,marginBottom:4}}>Story Points</div>
              <select value={addForm.pts} onChange={e=>setAddForm(p=>({...p,pts:e.target.value}))}
                style={{width:"100%",padding:"8px 10px",borderRadius:8,border:`1.5px solid ${BORDER}`,
                  background:SURFACE,fontFamily:"'Geologica',sans-serif",fontSize:12,color:TEXT_PRIMARY}}>
                <option value="0.125">0.125</option>
                <option value="0.25">0.25</option>
                <option value="0.35">0.35</option>
                <option value="0.5">0.5</option>
                <option value="0.75">0.75</option>
                <option value="1">1</option>
                <option value="1.25">1.25</option>
                <option value="1.5">1.5</option>
                <option value="2">2</option>
              </select>
            </div>

            {/* Weekly */}
            <div style={{marginBottom:20}}>
              <div style={{fontFamily:"'Geologica',sans-serif",fontSize:10,color:TEXT_MUTED,marginBottom:4}}>Weekly</div>
              <select value={addForm.weekly} onChange={e=>setAddForm(p=>({...p,weekly:e.target.value}))}
                style={{width:"100%",padding:"8px 10px",borderRadius:8,border:`1.5px solid ${BORDER}`,
                  background:SURFACE,fontFamily:"'Geologica',sans-serif",fontSize:12,color:TEXT_PRIMARY}}>
                <option value="W200">W200（本週 3/16–3/20）</option>
                <option value="W201">W201（下週 3/23–3/27）</option>
              </select>
            </div>

            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>setShowAddForm(false)}
                style={{flex:1,padding:"9px",borderRadius:8,border:`1.5px solid ${BORDER}`,
                  background:SURFACE,fontFamily:"'Geologica',sans-serif",fontSize:12,color:TEXT_MUTED}}>
                取消
              </button>
              <button onClick={handleAddTask} disabled={adding}
                style={{flex:2,padding:"9px",borderRadius:8,border:"none",
                  background:adding?"#b0bec5":"#8a9eba",color:"#fff",
                  fontFamily:"'Geologica',sans-serif",fontSize:12,fontWeight:600}}>
                {adding?"新增中...":"新增到 Notion"}
              </button>
            </div>
          </div>
        </div>
      )}
      {showSettings&&(
        <SettingsModal keyInput={keyInput} setKeyInput={setKeyInput}
          notionKey={notionKey} onSave={k=>setNotionKey(k)}
          onClose={()=>setShowSettings(false)}/>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<WeeklyDashboard/>);
</script>
</body>
</html>
