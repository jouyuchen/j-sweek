const BG="#ede8df",SURFACE="#e4ddd3",CARD="#f0ece5",BORDER="#d4cab8";
const SELECTED_BG="#8a9eba";
const TEXT_PRIMARY="#1a1a1a",TEXT_SECONDARY="#6b6056",TEXT_MUTED="#a09282";
const C_MEETING="#695773",C_DESIGN="#e08d53";
const C_DEPT_DBC="#d38989",C_DEPT_DESIGN="#e08d53",C_DEPT_CROSS="#8394a8";
const C_CARRYOVER="#a09282";

const isNotionMeeting = t => t?.startsWith("[Meeting]");
const getDeptColor = (dept, title) => {
  if (isNotionMeeting(title)) return C_MEETING;
  if (!dept) return TEXT_MUTED;
  if (dept.includes("DBC")) return C_DEPT_DBC;
  if (dept.includes("Design")) return C_DEPT_DESIGN;
  return C_DEPT_CROSS;
};
const getDeptLabel = (dept, title) => {
  if (isNotionMeeting(title)) return "Meeting";
  if (!dept) return "";
  if (dept.includes("Follow") || dept.includes("跨部門")) return "跨部門";
  if (dept.includes("Design")) return "Design";
  if (dept.includes("DBC")) return "DBC";
  return dept;
};

const taskDoneKey  = (d,i)     => `t:${d}::${i}`;
const eventDoneKey = (d,i)     => `e:${d}::${i}`;
const carryDoneKey = (disp,orig,i) => `carry:${disp}::${orig}::${i}`;
const LS_DONE = "done-w201";
const LS_KEY  = "notion-api-key";
const PROXY = "https://divine-violet-4469.jouyu-chen-jc.workers.dev";
const DB_ID = "b42b22da-7634-4f6a-95f9-37ec97ca40ac";
const JOY_ID = "1a59b1f2-b650-4d70-a70d-6e0b333e8962";
const WEEKLY_MAP = {
  "W201":{"id":"310bf447-adda-813d-9b22-df66abfbddce","label":"W201 (本週 3/23–3/27)"},
  "W202":{"id":"","label":"W202 (下週 3/30–4/3)"},

const DAY_DATE_MAP = {
  mon:"2026-03-23",tue:"2026-03-24",wed:"2026-03-25",thu:"2026-03-26",fri:"2026-03-27",

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2200);
}

// ── UI Components ─────────────────────────────────────────────────────────────
function Checkbox({onDone,onUndone,isDone}) {
  const [h,setH]=useState(false);
  return (
    <button onClick={isDone?onUndone:onDone}
      onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)}
      style={{marginTop:3,flexShrink:0,width:14,height:14,borderRadius:3,
        border:`1.5px solid ${isDone?"#7aad8a":h?"#7aad8a":BORDER}`,
        background:isDone?"#7aad8a":h?"rgba(122,173,138,0.15)":"transparent",
        transition:"all 0.15s",display:"flex",alignItems:"center",justifyContent:"center"}}>
      {isDone&&<span style={{color:"#fff",fontSize:9,lineHeight:1}}>✓</span>}
    </button>
  );
}

function TaskCard({task,onDone,onUndone,isDone,carryFrom}) {
  const dc=carryFrom?C_CARRYOVER:getDeptColor(task.dept,task.title);
  const dl=getDeptLabel(task.dept,task.title);
  return (
    <div style={{background:BG,border:`1px solid ${BORDER}`,borderLeft:`6px solid ${dc}`,
      borderRadius:"0 6px 6px 0",padding:"7px 10px",
      display:"flex",alignItems:"flex-start",gap:8,
      opacity:isDone?0.45:carryFrom?0.85:1,
      transition:"opacity 0.2s"}}>
      <Checkbox onDone={onDone} onUndone={onUndone} isDone={isDone}/>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontFamily:"'Noto Sans TC',sans-serif",fontSize:11.5,
          color:isDone?TEXT_MUTED:TEXT_PRIMARY,lineHeight:1.5,marginBottom:4,fontWeight:500,
          textDecoration:isDone?"line-through":"none"}}>
          {task.title}
        </div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{display:"flex",gap:6,alignItems:"center"}}>
            <span style={{fontFamily:"'Geologica',sans-serif",fontSize:9,
              color:dc,fontWeight:600,letterSpacing:"0.04em"}}>{dl}</span>
            {carryFrom&&<span style={{fontFamily:"'Geologica',sans-serif",fontSize:8,
              color:C_CARRYOVER,fontWeight:500}}>← {carryFrom}</span>}
          </div>
          <span style={{fontFamily:"'Geologica',sans-serif",fontSize:9,
            color:"#666",fontWeight:700}}>{task.pts}p</span>
        </div>
      </div>
    </div>
  );
}

function EventCard({ev,onDone,onUndone,isDone}) {
  return (
    <div style={{background:BG,border:`1px solid ${BORDER}`,borderLeft:`6px solid ${C_MEETING}`,
      borderRadius:"0 6px 6px 0",padding:"7px 10px",
      display:"flex",alignItems:"flex-start",gap:8}}>
      <Checkbox onDone={onDone} onUndone={onUndone} isDone={isDone}/>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontFamily:"'Geologica',sans-serif",fontSize:9,
          color:C_MEETING,fontWeight:700,letterSpacing:"0.04em",marginBottom:2}}>{ev.time}</div>
        <div style={{fontFamily:"'Noto Sans TC',sans-serif",fontSize:11.5,
          color:TEXT_PRIMARY,lineHeight:1.4,fontWeight:500}}>{ev.title}</div>
        {ev.with&&<div style={{fontFamily:"'Geologica',sans-serif",fontSize:9,
          color:TEXT_MUTED,marginTop:2}}>w/ {ev.with}</div>}
      </div>
    </div>
  );
}

function SectionHeader({dot,label,right}) {
  return (
    <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:10}}>
      <div style={{width:6,height:6,borderRadius:"50%",background:dot}}/>
      <span style={{fontFamily:"'Geologica',sans-serif",fontSize:9,color:TEXT_MUTED,
        letterSpacing:"0.12em",textTransform:"uppercase"}}>{label}</span>
      {right&&<div style={{marginLeft:"auto"}}>{right}</div>}
    </div>
  );
}

function WeeklyReview({doneSet}) {
  const undone=[];
  DAYS.forEach(day=>{
    (notionTasks[day.key]||[]).forEach((t,i)=>{
      const done=doneSet.has(taskDoneKey(day.key,i))||
        DAYS.some(ld=>doneSet.has(carryDoneKey(ld.key,day.key,i)));
      if(!done) undone.push({task:t,originDay:day});
    });
  });
  if(undone.length===0) return (
    <div style={{background:CARD,border:`1px solid ${BORDER}`,borderRadius:10,padding:14,marginBottom:8}}>
      <SectionHeader dot="#7aad8a" label="本週總覽"/>
      <div style={{fontFamily:"'Noto Sans TC',sans-serif",fontSize:12,
        color:"#7aad8a",textAlign:"center",padding:"10px 0"}}>🎉 本週全部完成！</div>
    </div>
  );
  return (
    <div style={{background:CARD,border:`1.5px solid #c9bfb0`,borderRadius:10,padding:14,marginBottom:8}}>
      <SectionHeader dot={C_CARRYOVER} label="本週未完成"
        right={<span style={{fontFamily:"'Geologica',sans-serif",fontSize:9,
          color:"#a09282",fontWeight:700}}>{undone.length} 項</span>}/>
      <div style={{display:"flex",flexDirection:"column",gap:5}}>
        {undone.map(({task,originDay},i)=>{
          const dc=getDeptColor(task.dept,task.title);
          return (
            <div key={i} style={{background:BG,border:`1px solid ${BORDER}`,
              borderLeft:`6px solid ${dc}`,borderRadius:"0 6px 6px 0",
              padding:"7px 10px",display:"flex",gap:8,opacity:0.8}}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontFamily:"'Noto Sans TC',sans-serif",fontSize:11.5,
                  color:TEXT_PRIMARY,lineHeight:1.5,marginBottom:4,fontWeight:500}}>{task.title}</div>
                <div style={{display:"flex",justifyContent:"space-between"}}>
                  <div style={{display:"flex",gap:6}}>
                    <span style={{fontFamily:"'Geologica',sans-serif",fontSize:9,
                      color:dc,fontWeight:600}}>{getDeptLabel(task.dept,task.title)}</span>
                    <span style={{fontFamily:"'Geologica',sans-serif",fontSize:8,
                      color:TEXT_MUTED,fontWeight:500}}>{originDay.label}</span>
                  </div>
                  <span style={{fontFamily:"'Geologica',sans-serif",fontSize:9,
                    color:"#666",fontWeight:700}}>{task.pts}p</span>
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function DayColumn({dayInfo,doneSet,onDone,onUndone,carryoverTasks}) {
  const allTasks=(notionTasks[dayInfo.key]||[]).map((t,i)=>({...t,_idx:i}));
  const allEvents=(calendarEvents[dayInfo.key]||[]).map((e,i)=>({...e,_idx:i}));
  const events=allEvents.filter(e=>!doneSet.has(eventDoneKey(dayInfo.key,e._idx)));
  const totalPts=allTasks.reduce((s,t)=>s+t.pts,0);
  const taskDone=allTasks.filter(t=>doneSet.has(taskDoneKey(dayInfo.key,t._idx))).length;
  const visibleCarry=carryoverTasks.filter(c=>!doneSet.has(carryDoneKey(dayInfo.key,c.originKey,c._idx)));
  return (
    <div style={{flex:1,minWidth:0,display:"flex",flexDirection:"column",gap:8}}>
      <div style={{background:CARD,border:`1px solid ${BORDER}`,borderRadius:10,padding:12}}>
        <SectionHeader dot={C_MEETING} label="Calendar"/>
        {events.length===0
          ?<div style={{fontFamily:"'Noto Sans TC',sans-serif",fontSize:11,
              color:TEXT_MUTED,textAlign:"center",padding:"10px 0"}}>—</div>
          :<div style={{display:"flex",flexDirection:"column",gap:5}}>
            {events.map(ev=>(
              <EventCard key={`${dayInfo.key}-ev-${ev._idx}`} ev={ev}
                isDone={doneSet.has(eventDoneKey(dayInfo.key,ev._idx))}
                onDone={()=>onDone(eventDoneKey(dayInfo.key,ev._idx))}
                onUndone={()=>onUndone&&onUndone(eventDoneKey(dayInfo.key,ev._idx))}/>
            ))}
          </div>
        }
      </div>
      <div style={{background:CARD,border:`1px solid ${BORDER}`,borderRadius:10,padding:12,flex:1}}>
        <SectionHeader dot={C_DESIGN} label="Notion"
          right={
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              {taskDone>0&&<span style={{fontFamily:"'Geologica',sans-serif",fontSize:9,
                color:"#7aad8a",fontWeight:600}}>✓ {taskDone}</span>}
              {totalPts>0&&<span style={{fontFamily:"'Geologica',sans-serif",fontSize:9,
                color:"#3d4a5c",fontWeight:700}}>{totalPts}p</span>}
            </div>
          }/>
        {allTasks.length===0&&visibleCarry.length===0
          ?<div style={{fontFamily:"'Noto Sans TC',sans-serif",fontSize:12,
              color:taskDone>0?"#7aad8a":TEXT_MUTED,textAlign:"center",padding:"14px 0"}}>
              {taskDone>0?"✓ 全部完成":"—"}
            </div>
          :<div style={{display:"flex",flexDirection:"column",gap:5}}>
            {allTasks.map(t=>(
              <TaskCard key={`${dayInfo.key}-task-${t._idx}`} task={t}
                isDone={doneSet.has(taskDoneKey(dayInfo.key,t._idx))}
                onDone={()=>onDone(taskDoneKey(dayInfo.key,t._idx))}
                onUndone={()=>onUndone&&onUndone(taskDoneKey(dayInfo.key,t._idx))}/>
            ))}
            {visibleCarry.length>0&&<>
              {allTasks.length>0&&<div style={{borderTop:`1px dashed ${BORDER}`,margin:"4px 0"}}/>}
              {visibleCarry.map((c,i)=>(
                <TaskCard key={`carry-${dayInfo.key}-${c.originKey}-${c._idx}`} task={c}
                  carryFrom={c.originLabel}
                  onDone={()=>onDone(carryDoneKey(dayInfo.key,c.originKey,c._idx))}/>
              ))}
            </>}
          </div>
        }
      </div>
    </div>
  );
}

function AddTaskModal({onClose,onAdd}) {
  const [form,setForm]=useState({title:'',day:'mon',dept:'DBC',pts:'0.25',weekly:'W201'});
  const [adding,setAdding]=useState(false);
  const handleAdd=async()=>{
    if(!form.title.trim()){showToast("✗ 請輸入票名");return;}
    setAdding(true);
    try{
      const weekly=WEEKLY_MAP[form.weekly];
      if(!weekly?.id){showToast("✗ 下週 Weekly ID 尚未設定");setAdding(false);return;}
      const deptMap={"DBC":"DBC","Design":"Design team / AlleyPin","Cross":"專案Follow / 跨部門"};
      const body={
        parent:{database_id:DB_ID},
        properties:{
          "Name":{title:[{text:{content:form.title.trim()}}]},
          "Department ":{select:{name:deptMap[form.dept]}},
          "Story points":{number:parseFloat(form.pts)},
          "Assign":{people:[{object:"user",id:JOY_ID}]},
          "期限":{date:{start:DAY_DATE_MAP[form.day]}},
          "⏰ Weekly":{relation:[{id:weekly.id}]},
        }
      };
      const res=await fetch(`${PROXY}/v1/pages`,{
        method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)
      });
      const data=await res.json();
      if(data.id){
        onAdd({title:form.title.trim(),dept:deptMap[form.dept],pts:parseFloat(form.pts),day:form.day});
        showToast("✓ 票已新增到 Notion！");
        onClose();
      } else {
        showToast("✗ 新增失敗："+JSON.stringify(data).slice(0,50));
      }
    }catch(e){showToast("✗ 錯誤："+e.message);}
    setAdding(false);
  };
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",
      display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,padding:20}}>
      <div style={{background:CARD,border:`1px solid ${BORDER}`,borderRadius:16,
        padding:24,width:"100%",maxWidth:360}}>
        <div style={{fontFamily:"'Geologica',sans-serif",fontWeight:700,fontSize:14,
          color:TEXT_PRIMARY,marginBottom:16}}>＋ 新增工作票</div>
        {[
          {label:"票名",content:<input value={form.title} onChange={e=>setForm(p=>({...p,title:e.target.value}))}
            placeholder="票名..." style={{width:"100%",padding:"8px 10px",borderRadius:8,border:`1.5px solid ${BORDER}`,
              background:SURFACE,fontFamily:"'Noto Sans TC',sans-serif",fontSize:12,color:TEXT_PRIMARY,outline:"none"}}/>},
          {label:"日期",content:<select value={form.day} onChange={e=>setForm(p=>({...p,day:e.target.value}))}
            style={{width:"100%",padding:"8px 10px",borderRadius:8,border:`1.5px solid ${BORDER}`,
              background:SURFACE,fontFamily:"'Geologica',sans-serif",fontSize:12,color:TEXT_PRIMARY}}>
            <option value="mon">MON 3/23</option><option value="tue">TUE 3/24</option>
            <option value="wed">WED 3/25</option><option value="thu">THU 3/26</option>
            <option value="fri">FRI 3/27</option></select>},
          {label:"Department",content:<select value={form.dept} onChange={e=>setForm(p=>({...p,dept:e.target.value}))}
            style={{width:"100%",padding:"8px 10px",borderRadius:8,border:`1.5px solid ${BORDER}`,
              background:SURFACE,fontFamily:"'Geologica',sans-serif",fontSize:12,color:TEXT_PRIMARY}}>
            <option value="DBC">DBC</option><option value="Design">Design team</option>
            <option value="Cross">跨部門</option></select>},
          {label:"Story Points",content:<select value={form.pts} onChange={e=>setForm(p=>({...p,pts:e.target.value}))}
            style={{width:"100%",padding:"8px 10px",borderRadius:8,border:`1.5px solid ${BORDER}`,
              background:SURFACE,fontFamily:"'Geologica',sans-serif",fontSize:12,color:TEXT_PRIMARY}}>
            {["0.125","0.25","0.35","0.5","0.75","1","1.25","1.5","2"].map(v=><option key={v} value={v}>{v}</option>)}
            </select>},
        ].map(({label,content})=>(
          <div key={label} style={{marginBottom:12}}>
            <div style={{fontFamily:"'Geologica',sans-serif",fontSize:10,color:TEXT_MUTED,marginBottom:4}}>{label}</div>
            {content}
          </div>
        ))}
        <div style={{display:"flex",gap:8,marginTop:4}}>
          <button onClick={onClose} style={{flex:1,padding:"9px",borderRadius:8,border:`1.5px solid ${BORDER}`,
            background:SURFACE,fontFamily:"'Geologica',sans-serif",fontSize:12,color:TEXT_MUTED}}>取消</button>
          <button onClick={handleAdd} disabled={adding}
            style={{flex:2,padding:"9px",borderRadius:8,border:"none",
              background:adding?"#b0bec5":"#8a9eba",color:"#fff",
              fontFamily:"'Geologica',sans-serif",fontSize:12,fontWeight:600}}>
            {adding?"新增中...":"新增到 Notion"}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── Main ──────────────────────────────────────────────────────────────────────
function WeeklyDashboard() {
  const [startIdx,setStartIdx]=useState(0);
  const [doneSet,setDoneSet]=useState(()=>{
    try{const s=localStorage.getItem(LS_DONE);return s?new Set(JSON.parse(s)):new Set();}
    catch{return new Set();}
  });
  const [localTasks,setLocalTasks]=useState(notionTasks);
  const [showAdd,setShowAdd]=useState(false);
  const visible=DAYS.slice(startIdx,startIdx+2);

  useEffect(()=>{
    try{localStorage.setItem(LS_DONE,JSON.stringify([...doneSet]));}catch{}
  },[doneSet]);

  const handleDone=(id)=>setDoneSet(prev=>new Set([...prev,id]));
  const handleUndone=(id)=>setDoneSet(prev=>{const s=new Set(prev);s.delete(id);return s;});

  const handleAddLocal=({title,dept,pts,day})=>{
    setLocalTasks(prev=>({...prev,[day]:[...(prev[day]||[]),{title,dept,pts}]}));
  };

  const isTaskDone=(dayKey,idx)=>
    doneSet.has(taskDoneKey(dayKey,idx))||
    DAYS.some(d=>doneSet.has(carryDoneKey(dayKey,d.key,idx)));

  const getCarryoverForDay=dayIdx=>{
    if(dayIdx===0)return[];
    const carry=[];
    for(let i=0;i<dayIdx;i++){
      const d=DAYS[i];
      ((localTasks)[d.key]||[]).forEach((t,idx)=>{
        if(!isTaskDone(d.key,idx))
          carry.push({...t,_idx:idx,originKey:d.key,originLabel:d.label});
      });
    }
    return carry;
  };

  const BtnStyle={
    fontFamily:"'Geologica',sans-serif",fontSize:9,fontWeight:600,
    letterSpacing:"0.06em",color:"#3d4a5c",background:CARD,
    border:`1px solid ${BORDER}`,borderRadius:6,padding:"5px 10px",transition:"all 0.15s"
  };

  return (
    <div style={{background:BG,minHeight:"100vh",padding:"20px 16px"}}>
      {/* Header */}
      <div style={{marginBottom:16,display:"flex",alignItems:"flex-start",
        justifyContent:"space-between",flexWrap:"wrap",gap:10}}>
        <div>
          <div style={{fontFamily:"'Geologica',sans-serif",fontSize:18,fontWeight:700,
            color:TEXT_PRIMARY,letterSpacing:"-0.02em"}}>This Week working hours in AlleyPin</div>
          <div style={{fontFamily:"'Geologica',sans-serif",fontSize:11,color:TEXT_MUTED,marginTop:2}}>
            W201 · '03.23 – 03.27' · Joy
          </div>
        </div>
        <div style={{display:"flex",flexWrap:"wrap",gap:6,alignItems:"center"}}>
          <button onClick={()=>setShowAdd(true)}
            style={{...BtnStyle,background:"#e08d53",color:"#fff",fontWeight:700,fontSize:13,
              padding:"6px 16px",borderRadius:8}}>＋ 新增票</button>
          <div style={{display:"flex",gap:10,alignItems:"center",marginLeft:4}}>
            {[{color:C_DEPT_DBC,label:"DBC"},{color:C_DEPT_DESIGN,label:"Design"},
              {color:C_DEPT_CROSS,label:"跨部門"},{color:C_MEETING,label:"Meeting"}].map(({color,label})=>(
              <div key={label} style={{display:"flex",alignItems:"center",gap:4}}>
                <div style={{width:7,height:3,borderRadius:2,background:color}}/>
                <span style={{fontFamily:"'Geologica',sans-serif",fontSize:9,color:TEXT_MUTED}}>{label}</span>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* Day tabs */}
      <div style={{display:"flex",gap:5,marginBottom:14}}>
        {DAYS.map((d,i)=>{
          const isActive=i===startIdx||i===startIdx+1;
          const remaining=(localTasks[d.key]||[]).filter((t,i)=>!doneSet.has(taskDoneKey(d.key,i))).length;
          const hasCal=(calendarEvents[d.key]||[]).length>0;
          const allDone=(localTasks[d.key]||[]).length>0&&remaining===0;
          const hasCarry=getCarryoverForDay(i).length>0;
          return (
            <button key={d.key} onClick={()=>setStartIdx(Math.min(i,DAYS.length-2))}
              style={{flex:1,padding:"8px 4px 6px",
                background:isActive?SELECTED_BG:SURFACE,
                border:`1.5px solid ${isActive?SELECTED_BG:BORDER}`,
                borderRadius:9,color:isActive?"#fff":TEXT_SECONDARY,
                fontFamily:"'Geologica',sans-serif",fontSize:10,
                fontWeight:isActive?700:400,letterSpacing:"0.07em",transition:"all 0.15s"}}>
              <div>{d.label}</div>
              <div style={{fontSize:9,marginTop:1,opacity:0.75}}>{d.date}</div>
              <div style={{display:"flex",gap:3,justifyContent:"center",marginTop:4}}>
                {hasCal&&<div style={{width:4,height:4,borderRadius:"50%",
                  background:isActive?"rgba(255,255,255,0.7)":C_MEETING}}/>}
                {hasCarry&&<div style={{width:4,height:4,borderRadius:"50%",
                  background:isActive?"rgba(255,255,255,0.7)":C_CARRYOVER}}/>}
                {allDone
                  ?<div style={{width:4,height:4,borderRadius:"50%",
                      background:isActive?"rgba(255,255,255,0.7)":"#7aad8a"}}/>
                  :remaining>0&&<div style={{width:4,height:4,borderRadius:"50%",
                      background:isActive?"rgba(255,255,255,0.7)":C_DESIGN}}/>
                }
              </div>
            </button>
          );
        })}
      </div>

      {/* Two-column */}
      <div style={{display:"flex",gap:10}}>
        {visible.map(d=>{
          const dayIdx=DAYS.findIndex(x=>x.key===d.key);
          const isFri=d.key==="fri";
          return (
            <div key={d.key} style={{flex:1,minWidth:0}}>
              <div style={{fontFamily:"'Geologica',sans-serif",fontSize:11,fontWeight:700,
                color:TEXT_SECONDARY,letterSpacing:"0.08em",marginBottom:8,paddingLeft:2}}>
                {d.label} <span style={{fontWeight:400,color:TEXT_MUTED}}>{d.date}</span>
              </div>
              {isFri&&<WeeklyReview doneSet={doneSet}/>}
              <DayColumn dayInfo={d} doneSet={doneSet} onDone={handleDone} onUndone={handleUndone}
                carryoverTasks={getCarryoverForDay(dayIdx)}/>
            </div>
          );
        })}
      </div>

      {showAdd&&<AddTaskModal onClose={()=>setShowAdd(false)} onAdd={handleAddLocal}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<WeeklyDashboard/>);
</script>
</body>
</html>
